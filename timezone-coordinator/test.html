<!DOCTYPE html>
<html>
<head>
  <title>Test Runner</title>
</head>
<body>

<h2>JS Test Results</h2>
<pre id="output"></pre>

<script>
function calculatePain(hour) {
  if (hour >= 9 && hour <= 16) return 0;
  if (hour === 8 || (hour >= 17 && hour <= 19)) return 10;
  return 50;
}

function log(msg) {
  document.getElementById("output").textContent += msg + "\n";
}

function test(name, condition) {
  if (condition) {
    log("✅ " + name);
  } else {
    log("❌ " + name);
  }
}

// Tests
test("Work hour", calculatePain(10) === 0);
test("Night hour", calculatePain(22) === 50);
test("Edge hour", calculatePain(8) === 10);

</script>

</body>
</html>
